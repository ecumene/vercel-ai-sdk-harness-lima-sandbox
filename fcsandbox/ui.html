<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Firecracker Sandboxes</title>
<style>
  :root {
    --bg: #0a0e14; --panel: #121821; --panel2: #18202c; --line: #243041;
    --txt: #e6edf3; --dim: #8b98a9; --accent: #ff5d2e; --accent2: #ffb02e;
    --green: #2ecc71; --red: #ff5470; --blue: #4aa8ff; --purple: #b98cff;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 70% -10%, #1a2230 0%, var(--bg) 55%);
    color: var(--txt); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 14px; padding: 20px 28px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: rgba(10,14,20,.82); backdrop-filter: blur(10px); z-index: 5;
  }
  .flame { font-size: 26px; filter: drop-shadow(0 0 8px var(--accent)); }
  h1 { font-size: 17px; margin: 0; letter-spacing: .3px; }
  h1 small { color: var(--dim); font-weight: 400; font-size: 12px; margin-left: 8px; }
  .live { margin-left: auto; display: flex; align-items: center; gap: 8px; color: var(--dim); font-size: 12px; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 rgba(46,204,113,.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(46,204,113,.5)} 70%{box-shadow:0 0 0 7px rgba(46,204,113,0)} 100%{box-shadow:0 0 0 0 rgba(46,204,113,0)} }

  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; padding: 22px 28px 6px; }
  .stat { background: linear-gradient(180deg, var(--panel2), var(--panel)); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
  .stat .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; }
  .stat .v { font-size: 26px; font-weight: 650; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .stat .v span { font-size: 13px; color: var(--dim); font-weight: 400; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; padding: 18px 28px 40px; }
  .card { background: linear-gradient(180deg, var(--panel2), var(--panel)); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; transition: border-color .2s, transform .1s; }
  .card:hover { border-color: #36465c; }
  .card .top { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.unreachable { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .dot.stopped { background: var(--dim); }
  .name { font-family: var(--mono); font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { margin-left: auto; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--dim); }
  .badge.running { color: var(--green); border-color: #1f5b3a; background: #112418; }
  .badge.unreachable { color: var(--accent2); border-color: #5b4a1f; background: #241f11; }
  .badge.stopped { color: var(--dim); }
  .badge.busy { color: var(--blue); border-color: #1f3f5b; background: #112030; }

  .rows { padding: 4px 16px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; }
  .row { display: flex; justify-content: space-between; gap: 10px; font-size: 12.5px; border-bottom: 1px dashed #1c2533; padding-bottom: 5px; }
  .row .l { color: var(--dim); }
  .row .r { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .bar { height: 6px; border-radius: 4px; background: #0e141d; overflow: hidden; margin-top: 6px; }
  .bar > i { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .metrics { grid-column: 1 / -1; border-top: 1px solid var(--line); margin-top: 6px; padding-top: 10px; display: none; }
  .metrics.show { display: block; }
  .mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; }
  .last { grid-column: 1/-1; color: var(--dim); font-size: 11.5px; font-family: var(--mono); margin-top: 6px; }
  .last code { color: var(--txt); }
  .ok { color: var(--green); } .bad { color: var(--red); }
  .empty { color: var(--dim); text-align: center; padding: 60px; grid-column: 1/-1; }
  footer { color: var(--dim); font-size: 11px; text-align: center; padding: 0 0 28px; }
</style>
</head>
<body>
  <header>
    <span class="flame">🔥</span>
    <h1>Firecracker Sandboxes <small id="sub">control plane</small></h1>
    <div class="live"><span class="pulse"></span><span id="clock">live</span></div>
  </header>

  <section class="summary" id="summary"></section>
  <main class="grid" id="grid"><div class="empty">Loading…</div></main>
  <footer>auto-refresh every 2s · click a VM for live in-guest metrics</footer>

<script>
const prev = new Map();      // name -> { cpuSeconds, t }  for CPU% delta
const expanded = new Set();  // names with metrics open
const metricsCache = new Map();

const fmtDur = (s) => {
  s = Math.max(0, Math.round(s));
  const h = Math.floor(s/3600), m = Math.floor(s%3600/60), sec = s%60;
  return h ? `${h}h ${m}m` : m ? `${m}m ${sec}s` : `${sec}s`;
};
const ago = (ms) => ms ? fmtDur((Date.now()-ms)/1000)+' ago' : '—';

async function tick() {
  let data;
  try { data = await (await fetch('/api/sandboxes')).json(); }
  catch { document.getElementById('clock').textContent = 'offline'; return; }
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  renderSummary(data.summary);
  renderGrid(data.sandboxes);
}

function renderSummary(s) {
  const cells = [
    ['Running VMs', `${s.running}<span> / ${s.total}</span>`],
    ['vCPUs (running)', s.vcpus],
    ['Guest RAM', `${s.memMib}<span> MiB</span>`],
    ['Host RSS', `${s.rssMiB}<span> MiB</span>`],
    ['Commands run', s.commands],
  ];
  document.getElementById('summary').innerHTML = cells.map(([k,v]) =>
    `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
}

function renderGrid(list) {
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty">No sandboxes yet. Start a Pi session to spawn one.</div>'; return; }
  grid.innerHTML = list.map(card).join('');
  for (const sb of list) {
    const el = document.getElementById('top-'+sb.name);
    if (el) el.onclick = () => toggle(sb.name);
    if (expanded.has(sb.name)) renderMetrics(sb.name);
  }
}

function cpuPct(sb) {
  const now = { cpuSeconds: sb.host.cpuSeconds, t: Date.now() };
  const p = prev.get(sb.name);
  prev.set(sb.name, now);
  if (!p || now.t === p.t) return null;
  const pct = (now.cpuSeconds - p.cpuSeconds) / ((now.t - p.t)/1000) * 100;
  return Math.max(0, Math.min(100, pct));
}

function card(sb) {
  const busy = sb.commands.running > 0;
  const badge = busy ? 'busy' : sb.status;
  const badgeText = busy ? `running ${sb.commands.running} cmd` : sb.status;
  const cpu = cpuPct(sb);
  const memPct = sb.memMib ? Math.min(100, sb.host.rssMiB / sb.memMib * 100) : 0;
  const last = sb.commands.last;
  return `
  <div class="card">
    <div class="top" id="top-${sb.name}">
      <span class="dot ${sb.status}"></span>
      <span class="name">${sb.name}</span>
      <span class="badge ${badge}">${badgeText}</span>
    </div>
    <div class="rows">
      <div class="row"><span class="l">IP</span><span class="r">${sb.ip ?? '—'}</span></div>
      <div class="row"><span class="l">PID</span><span class="r">${sb.host.pid ?? '—'}</span></div>
      <div class="row"><span class="l">vCPU / RAM</span><span class="r">${sb.vcpus ?? '?'} / ${sb.memMib ?? '?'}M</span></div>
      <div class="row"><span class="l">Uptime</span><span class="r">${fmtDur(sb.uptimeSec)}</span></div>
      <div class="row"><span class="l">CPU</span><span class="r">${cpu==null?'…':cpu.toFixed(0)+'%'}</span></div>
      <div class="row"><span class="l">Host RSS</span><span class="r">${sb.host.rssMiB}M</span></div>
      <div style="grid-column:1/-1">
        <div class="row" style="border:0;padding:0"><span class="l">Host RSS / RAM cap</span><span class="r">${memPct.toFixed(0)}%</span></div>
        <div class="bar"><i style="width:${memPct}%"></i></div>
      </div>
      <div class="last">cmds: ${sb.commands.total} · last: ${last ? `<code>${esc(last.command)}</code> → <span class="${last.exitCode===0?'ok':'bad'}">exit ${last.exitCode}</span> (${last.durationMs}ms, ${ago(last.at)})` : '—'}</div>
      <div class="metrics ${expanded.has(sb.name)?'show':''}" id="m-${sb.name}"><div class="mgrid"><div class="l">loading metrics…</div></div></div>
    </div>
  </div>`;
}

function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function toggle(name) {
  if (expanded.has(name)) { expanded.delete(name); document.getElementById('m-'+name)?.classList.remove('show'); return; }
  expanded.add(name);
  document.getElementById('m-'+name)?.classList.add('show');
  renderMetrics(name);
}

async function renderMetrics(name) {
  const el = document.getElementById('m-'+name);
  if (!el) return;
  try {
    const m = await (await fetch(`/api/sandboxes/${encodeURIComponent(name)}/metrics`)).json();
    metricsCache.set(name, m);
    const memPct = m.memTotalMiB ? (m.memUsedMiB/m.memTotalMiB*100) : 0;
    el.innerHTML = `<div class="mgrid">
      <div class="row"><span class="l">guest uptime</span><span class="r">${fmtDur(m.uptimeSec)}</span></div>
      <div class="row"><span class="l">load avg</span><span class="r">${(m.load||[]).join('  ')||'—'}</span></div>
      <div class="row"><span class="l">mem used</span><span class="r">${m.memUsedMiB}/${m.memTotalMiB}M (${memPct.toFixed(0)}%)</span></div>
      <div class="row"><span class="l">processes</span><span class="r">${m.procs}</span></div>
      <div class="row"><span class="l">/workspace disk</span><span class="r">${m.diskUsedMiB}/${m.diskTotalMiB}M (${m.diskUsePct}%)</span></div>
    </div>`;
  } catch {
    el.innerHTML = '<div class="mgrid"><div class="l">metrics unavailable</div></div>';
  }
}

tick();
setInterval(tick, 2000);
</script>
</body>
</html>
